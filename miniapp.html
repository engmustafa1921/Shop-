<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>لوحة تحكم المتجر</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #0f0f13);
    --text: var(--tg-theme-text-color, #ffffff);
    --hint: var(--tg-theme-hint-color, #888);
    --btn: var(--tg-theme-button-color, #6c63ff);
    --btn-text: var(--tg-theme-button-text-color, #fff);
    --secondary-bg: var(--tg-theme-secondary-bg-color, #1a1a24);
    --accent: #6c63ff;
    --green: #43e97b;
    --red: #ff6584;
    --gold: #ffd700;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── Header ── */
  .header {
    background: var(--secondary-bg);
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
    border-bottom: 1px solid #ffffff10;
  }
  .header h1 { font-size: 1.1rem; font-weight: 700; }
  .refresh-btn {
    background: none; border: none; color: var(--hint);
    font-size: 1.3rem; cursor: pointer; padding: 4px;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex; overflow-x: auto;
    background: var(--secondary-bg);
    border-bottom: 1px solid #ffffff10;
    padding: 0 8px;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 12px 16px; white-space: nowrap;
    font-family: 'Cairo', sans-serif;
    font-size: .85rem; font-weight: 600;
    background: none; border: none;
    color: var(--hint); cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Content ── */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* ── Stats ── */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .stat-card {
    background: var(--secondary-bg);
    border-radius: 16px; padding: 16px;
    text-align: center;
  }
  .stat-icon { font-size: 1.6rem; margin-bottom: 6px; }
  .stat-value { font-size: 1.5rem; font-weight: 900; }
  .stat-label { font-size: .75rem; color: var(--hint); margin-top: 2px; }

  /* ── Cards ── */
  .card {
    background: var(--secondary-bg);
    border-radius: 16px; padding: 16px;
    margin-bottom: 10px;
  }
  .card-title { font-size: .95rem; font-weight: 700; margin-bottom: 4px; }
  .card-sub { font-size: .8rem; color: var(--hint); }
  .card-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .price { font-size: 1rem; font-weight: 700; color: var(--green); }
  .stock { font-size: .8rem; color: var(--hint); }

  /* ── Badges ── */
  .badge {
    padding: 3px 10px; border-radius: 50px;
    font-size: .72rem; font-weight: 700;
  }
  .badge-pending   { background: #ffd70022; color: var(--gold); }
  .badge-confirmed { background: #6c63ff22; color: var(--accent); }
  .badge-shipping  { background: #00bfff22; color: #00bfff; }
  .badge-delivered { background: #43e97b22; color: var(--green); }
  .badge-cancelled { background: #ff658422; color: var(--red); }

  /* ── Buttons ── */
  .btn {
    padding: 10px 18px; border-radius: 12px; border: none;
    font-family: 'Cairo', sans-serif;
    font-size: .85rem; font-weight: 700;
    cursor: pointer; transition: all .2s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--btn); color: var(--btn-text); width: 100%; justify-content: center; }
  .btn-sm { padding: 6px 12px; font-size: .78rem; }
  .btn-ghost {
    background: #ffffff10; color: var(--text);
    border: 1px solid #ffffff15;
  }
  .btn-danger { background: #ff658422; color: var(--red); border: 1px solid var(--red); }
  .btn-success { background: #43e97b22; color: var(--green); border: 1px solid var(--green); }

  /* ── Form ── */
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: .82rem; color: var(--hint); margin-bottom: 6px; }
  input, textarea, select {
    width: 100%; background: var(--secondary-bg);
    border: 1px solid #ffffff15; color: var(--text);
    border-radius: 12px; padding: 12px 14px;
    font-family: 'Cairo', sans-serif; font-size: .9rem;
    outline: none; transition: border-color .2s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }

  /* ── Action buttons in card ── */
  .card-actions { display: flex; gap: 8px; margin-top: 10px; }

  /* ── Empty state ── */
  .empty {
    text-align: center; padding: 40px 20px;
    color: var(--hint);
  }
  .empty .emoji { font-size: 3rem; margin-bottom: 12px; }

  /* ── Loading ── */
  .loading {
    text-align: center; padding: 40px;
    color: var(--hint); font-size: .9rem;
  }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #1a1a24; border: 1px solid #ffffff20;
    border-radius: 12px; padding: 10px 20px;
    font-size: .85rem; font-weight: 600;
    transition: transform .3s; z-index: 999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Add form section ── */
  .section-title {
    font-size: .8rem; color: var(--hint);
    text-transform: uppercase; letter-spacing: .08em;
    margin-bottom: 12px; margin-top: 20px;
  }

  /* ── Order detail ── */
  .order-info { font-size: .85rem; line-height: 1.8; }
  .order-info span { color: var(--hint); }

  .fab {
    position: fixed; bottom: 24px; left: 20px;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--btn); color: var(--btn-text);
    border: none; font-size: 1.5rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 4px 20px #6c63ff44;
    z-index: 40;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🛒 لوحة تحكم المتجر</h1>
  <button class="refresh-btn" onclick="refreshData()" title="تحديث">🔄</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('stats')">📊 الإحصائيات</button>
  <button class="tab" onclick="showTab('products')">📦 المنتجات</button>
  <button class="tab" onclick="showTab('add-product')">➕ إضافة</button>
  <button class="tab" onclick="showTab('orders')">📋 الطلبات</button>
</div>

<!-- Stats -->
<div class="page active" id="tab-stats">
  <div id="stats-content"><div class="loading">⏳ جاري تحميل البيانات...</div></div>
</div>

<!-- Products -->
<div class="page" id="tab-products">
  <div id="products-content"><div class="loading">⏳ جاري تحميل المنتجات...</div></div>
</div>

<!-- Add Product -->
<div class="page" id="tab-add-product">
  <div class="section-title">إضافة منتج جديد</div>
  <div class="card">
    <div class="form-group">
      <label>اسم المنتج *</label>
      <input type="text" id="p-name" placeholder="مثال: جوال سامسونج A55">
    </div>
    <div class="form-group">
      <label>الوصف</label>
      <textarea id="p-desc" placeholder="وصف المنتج..."></textarea>
    </div>
    <div class="form-group">
      <label>السعر (IQD) *</label>
      <input type="number" id="p-price" placeholder="500000">
    </div>
    <div class="form-group">
      <label>الكمية في المخزون *</label>
      <input type="number" id="p-stock" placeholder="10">
    </div>
    <button class="btn btn-primary" onclick="addProduct()">💾 إضافة المنتج</button>
  </div>
</div>

<!-- Orders -->
<div class="page" id="tab-orders">
  <div id="orders-content"><div class="loading">⏳ جاري تحميل الطلبات...</div></div>
</div>

<div id="toast"></div>

<script>
// ── إعداد تيليغرام ──────────────────────────
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

// ── البيانات (تأتي من البوت عبر URL) ─────────
let storeData = { stats: {}, products: [], orders: [] };

function loadDataFromURL() {
  try {
    const hash = window.location.hash.slice(1);
    if (hash) {
      const decoded = atob(decodeURIComponent(hash));
      storeData = JSON.parse(decoded);
      renderAll();
    } else {
      // طلب البيانات من البوت
      requestData();
    }
  } catch(e) {
    requestData();
  }
}

function requestData() {
  // يرسل طلب للبوت لإعادة فتح الصفحة بالبيانات
  tg.sendData(JSON.stringify({ action: 'get_data' }));
  document.getElementById('stats-content').innerHTML =
    '<div class="empty"><div class="emoji">📡</div><p>أرسل الأمر /panel من تيليغرام لتحميل البيانات</p></div>';
}

function refreshData() {
  tg.sendData(JSON.stringify({ action: 'get_data' }));
  toast('⏳ جاري تحديث البيانات...');
}

// ── عرض البيانات ──────────────────────────────
function renderAll() {
  renderStats();
  renderProducts();
  renderOrders();
}

function renderStats() {
  const s = storeData.stats || {};
  const html = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📦</div>
        <div class="stat-value">${s.total_orders || 0}</div>
        <div class="stat-label">إجمالي الطلبات</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏳</div>
        <div class="stat-value">${s.pending || 0}</div>
        <div class="stat-label">قيد الانتظار</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-value">${s.delivered || 0}</div>
        <div class="stat-label">تم التسليم</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🛍️</div>
        <div class="stat-value">${s.products || 0}</div>
        <div class="stat-label">منتجات نشطة</div>
      </div>
    </div>
    <div class="card">
      <div class="stat-icon">💰</div>
      <div class="stat-value">${Number(s.total_revenue || 0).toLocaleString()} IQD</div>
      <div class="stat-label">إجمالي الإيرادات</div>
    </div>
  `;
  document.getElementById('stats-content').innerHTML = html;
}

function renderProducts() {
  const products = storeData.products || [];
  if (!products.length) {
    document.getElementById('products-content').innerHTML =
      '<div class="empty"><div class="emoji">📦</div><p>لا توجد منتجات بعد</p></div>';
    return;
  }
  const html = products.map(p => `
    <div class="card">
      <div class="card-row">
        <div>
          <div class="card-title">${p.name}</div>
          <div class="card-sub">${p.description || 'لا يوجد وصف'}</div>
        </div>
        <span class="badge ${p.active ? 'badge-delivered' : 'badge-cancelled'}">${p.active ? 'نشط' : 'موقوف'}</span>
      </div>
      <div class="card-row">
        <span class="price">${Number(p.price).toLocaleString()} IQD</span>
        <span class="stock">المخزون: ${p.stock}</span>
      </div>
      <div class="card-actions">
        <button class="btn btn-ghost btn-sm" onclick="toggleProduct(${p.id}, ${p.active})">
          ${p.active ? '⏸️ إيقاف' : '▶️ تفعيل'}
        </button>
        <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id}, '${p.name}')">🗑️ حذف</button>
      </div>
    </div>
  `).join('');
  document.getElementById('products-content').innerHTML = html;
}

function renderOrders() {
  const orders = storeData.orders || [];
  if (!orders.length) {
    document.getElementById('orders-content').innerHTML =
      '<div class="empty"><div class="emoji">📋</div><p>لا توجد طلبات بعد</p></div>';
    return;
  }
  const statusMap = {
    pending:    { label:'⏳ منتظر',    cls:'badge-pending' },
    confirmed:  { label:'✅ مؤكد',     cls:'badge-confirmed' },
    processing: { label:'🔧 تجهيز',    cls:'badge-confirmed' },
    shipping:   { label:'🚚 توصيل',    cls:'badge-shipping' },
    delivered:  { label:'📦 مسلّم',    cls:'badge-delivered' },
    cancelled:  { label:'❌ ملغي',     cls:'badge-cancelled' },
  };
  const html = orders.map(o => `
    <div class="card">
      <div class="card-row">
        <div>
          <div class="card-title">#${o.id} — ${o.cust_name}</div>
          <div class="card-sub">📱 ${o.phone}</div>
          <div class="card-sub">📍 ${o.address}</div>
        </div>
        <span class="badge ${statusMap[o.status]?.cls||''}">${statusMap[o.status]?.label||o.status}</span>
      </div>
      <div class="card-row">
        <span class="price">${Number(o.total).toLocaleString()} IQD</span>
        <span class="stock">${o.created_at?.slice(0,10)||''}</span>
      </div>
      <div class="card-actions" style="flex-wrap:wrap">
        <button class="btn btn-success btn-sm" onclick="updateOrder(${o.id},'confirmed')">✅ تأكيد</button>
        <button class="btn btn-ghost btn-sm" onclick="updateOrder(${o.id},'shipping')">🚚 توصيل</button>
        <button class="btn btn-ghost btn-sm" onclick="updateOrder(${o.id},'delivered')">📦 مسلّم</button>
        <button class="btn btn-danger btn-sm" onclick="updateOrder(${o.id},'cancelled')">❌ إلغاء</button>
      </div>
    </div>
  `).join('');
  document.getElementById('orders-content').innerHTML = html;
}

// ── الأوامر ────────────────────────────────────
function addProduct() {
  const name  = document.getElementById('p-name').value.trim();
  const desc  = document.getElementById('p-desc').value.trim();
  const price = document.getElementById('p-price').value.trim();
  const stock = document.getElementById('p-stock').value.trim();

  if (!name || !price || !stock) {
    tg.showAlert('⚠️ أكمل الحقول المطلوبة: الاسم، السعر، الكمية');
    return;
  }

  tg.showConfirm(`إضافة المنتج: ${name}\nالسعر: ${Number(price).toLocaleString()} IQD\nالكمية: ${stock}`, (ok) => {
    if (!ok) return;
    tg.sendData(JSON.stringify({
      action: 'add_product',
      name, desc, price: parseFloat(price), stock: parseInt(stock)
    }));
    // مسح الفورم
    document.getElementById('p-name').value = '';
    document.getElementById('p-desc').value = '';
    document.getElementById('p-price').value = '';
    document.getElementById('p-stock').value = '';
    toast('✅ تم إرسال طلب الإضافة للبوت');
    showTab('products');
  });
}

function deleteProduct(pid, name) {
  tg.showConfirm(`هل تريد حذف المنتج: ${name}؟`, (ok) => {
    if (!ok) return;
    tg.sendData(JSON.stringify({ action: 'delete_product', id: pid }));
    toast('🗑️ تم إرسال طلب الحذف');
  });
}

function toggleProduct(pid, currentActive) {
  const action = currentActive ? 'إيقاف' : 'تفعيل';
  tg.showConfirm(`هل تريد ${action} هذا المنتج؟`, (ok) => {
    if (!ok) return;
    tg.sendData(JSON.stringify({ action: 'toggle_product', id: pid }));
    toast(`✅ تم إرسال طلب ${action}`);
  });
}

function updateOrder(oid, status) {
  const labels = { confirmed:'تأكيد', shipping:'إرسال للتوصيل', delivered:'تأكيد التسليم', cancelled:'إلغاء' };
  tg.showConfirm(`هل تريد ${labels[status]} الطلب #${oid}؟`, (ok) => {
    if (!ok) return;
    tg.sendData(JSON.stringify({ action: 'update_order', id: oid, status }));
    toast('✅ تم إرسال التحديث للبوت');
  });
}

// ── مساعد ────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['stats','products','add-product','orders'][i] === name);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── تشغيل ──────────────────────────────────
loadDataFromURL();
</script>
</body>
</html>
